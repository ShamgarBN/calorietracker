name: Supabase keep-alive

# Supabase free projects PAUSE after 7 days of inactivity. This pings the REST API
# every 3 days so the project never sleeps. (Free on all GitHub plans.)
# Requires repo secrets VITE_SUPABASE_URL and VITE_SUPABASE_ANON_KEY (same as deploy).
#
# Note: scheduled Actions are themselves disabled by GitHub after 60 days of NO repo
# activity. If you ever go fully dormant, also set up a free UptimeRobot HTTP monitor
# on the same URL as a belt-and-braces backup (see README).

on:
  schedule:
    - cron: '17 6 */3 * *' # every 3 days at 06:17 UTC
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase REST
        run: |
          # Hit the REST root (schema-agnostic — works whether the app lives in
          # `public` or a shared-project schema like `tracker`). Any HTTP response
          # counts as activity and keeps the project awake.
          code=$(curl -s -o /dev/null -w "%{http_code}" \
            "${{ secrets.VITE_SUPABASE_URL }}/rest/v1/" \
            -H "apikey: ${{ secrets.VITE_SUPABASE_ANON_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.VITE_SUPABASE_ANON_KEY }}")
          echo "HTTP $code"
          if [ "$code" = "000" ]; then echo "No response — project may be paused"; exit 1; fi
